body{
    margin:0;
    padding:30px;

h1{

.grid{

    max-width:1400px;

.section{

    border:2px solid #d6d6d6;

}

.poem-link{

    text-decoration:none;
    margin-bottom:12px;
}

.poem-btn{
    width:100%;
    border:none;
    border-radius:14px;
    padding:14px;
    text-align:left;
    background:#fff;
    border:2px solid #ff4fa3;
    font-family:inherit;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

.poem-btn:hover{
    background:#ffe6f2;
}
</style>
</head>
